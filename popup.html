<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div class="logo">Keep<span>Tabs</span></div>
    <button id="backupBtn" class="ghost" title="Download all folders as JSON">⬇ Backup</button>
  </header>

  <section class="save-box">
    <input id="folderName" type="text" placeholder="Folder name (e.g. work)" autocomplete="off" maxlength="40">
    <button id="saveBtn" class="primary">
      Save tabs in this window (<span id="tabCount">0</span>)
    </button>
  </section>

  <section id="folders" class="folders"></section>

  <div id="empty" class="empty">
    No saved folders yet.<br>
    Create your first folder above.
  </div>

  <footer>Your data stays on this device. No account, no servers.</footer>

  <script src="popup.js"></script>
</body>
</html>
