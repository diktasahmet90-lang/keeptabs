<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div class="logo">Keep<span>Tabs</span></div>
    <button id="backupBtn" class="ghost" title="Tüm klasörleri JSON olarak indir">⬇ Yedek</button>
  </header>

  <section class="save-box">
    <input id="folderName" type="text" placeholder="Klasör adı (örn: kod)" autocomplete="off" maxlength="40">
    <button id="saveBtn" class="primary">
      Bu penceredeki sekmeleri kaydet (<span id="tabCount">0</span>)
    </button>
  </section>

  <section id="folders" class="folders"></section>

  <div id="empty" class="empty">
    Henüz kayıtlı klasör yok.<br>
    Yukarıdan ilk klasörünü oluştur.
  </div>

  <footer>Verin sadece bu cihazda. Hesap yok, sunucu yok.</footer>

  <script src="popup.js"></script>
</body>
</html>
